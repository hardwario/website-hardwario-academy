<section class="hero">
  <div class="container hero__inner">
    <div class="hero__copy">
      <h1 class="hero__title">
        <span class="hero__line">{{ d.hero_title_1 }}</span>
        <span class="hero__line"><span class="hero__hl">{{ d.hero_title_2 }}</span></span>
        <span class="hero__line"><span class="hero__red">{{ d.hero_title_3 }}</span></span>
      </h1>
      <p class="hero__text">{{ d.hero_text }}</p>
      <div class="hero__cta">
        <a href="#balicky" class="btn btn--primary">{{ d.hero_cta_primary }}</a>
        <a href="#pro-ucitele" class="btn btn--outline">{{ d.hero_cta_secondary }}</a>
      </div>
    </div>
    <div class="hero__visual">
      <img src="{{ get_url(path='img/hero-product.png') }}" alt="{{ trans(key='hero_img_alt', lang=lang) }}"
           width="1480" height="552" loading="eager" fetchpriority="high" decoding="async">
    </div>
  </div>

  <div class="stats-wrap">
    <div class="container stats" data-aos-stagger>
      {% for s in d.stats %}
      <div class="stats__item">
        <div class="stats__value">{{ s.value }}</div>
        <div class="stats__label">{{ s.label }}</div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
