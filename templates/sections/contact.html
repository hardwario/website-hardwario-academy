{% import "macros.html" as macros %}

<section class="contact" id="kontakt">
  <div class="container contact__inner">
    <div class="contact__copy" data-aos="fade-right">
      <span class="kicker">{{ d.contact_kicker }}</span>
      <h2 class="h2--big h2--ink">{{ d.contact_title }}</h2>
      <p class="lead">{{ d.contact_text }}</p>
      <div class="contact__phone">
        <p>{{ d.contact_phone_note }}</p>
        <a href="{{ config.extra.phone_href }}">{{ config.extra.phone }}</a>
      </div>
    </div>
    <form class="contact-form" method="post" action="#" onsubmit="return false;" data-aos="fade-left">
      <div class="contact-form__grid">
        <label>Jméno a příjmení *
          <input type="text" name="name" placeholder="Zadejte své jméno" required>
        </label>
        <label>Škola *
          <input type="text" name="school" placeholder="Název školy" required>
        </label>
        <label>Email *
          <input type="email" name="email" placeholder="Zadejte svůj e-mail" required>
        </label>
        <label>O co máte zájem? *
          <select name="interest" required>
            <option value="" disabled selected>Vyberte...</option>
            <option>Pilotní sada</option>
            <option>Balíček pro celou třídu</option>
            <option>Sada pro celý ročník</option>
            <option>Konzultace</option>
          </select>
        </label>
        <label class="contact-form__full">Vaše zpráva *
          <textarea name="message" rows="4" placeholder="Co učíte, kolik studentů, jaký předmět..."></textarea>
        </label>
      </div>
      <button type="submit" class="btn btn--primary contact-form__submit">Odeslat</button>
    </form>
  </div>
</section>
