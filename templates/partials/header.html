{% import "macros.html" as macros %}

<header class="site-header" id="top">
  <div class="container site-header__inner">
    {{ macros::logo() }}

    <nav class="main-nav" aria-label="Hlavní navigace">
      <a href="#proc-tower">Proč TOWER</a>
      <a href="#kurzy">Kurzy</a>
      <a href="#pro-ucitele">Pro učitele</a>
      <a href="#balicky">Balíčky pro školy</a>
      <a href="#kontakt">Kontakt</a>

      <div class="nav__controls">
        <div class="nav__toggles">
          <button class="icon-btn theme-toggle" type="button" aria-label="Přepnout tmavý režim" aria-pressed="false">
            <svg class="theme-toggle__moon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 11.5A7.5 7.5 0 0 1 8.5 3a7.5 7.5 0 1 0 8.5 8.5Z"/></svg>
            <svg class="theme-toggle__sun" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden><circle cx="10" cy="10" r="3.6"/><path d="M10 1.5v2M10 16.5v2M2.5 10h2M15.5 10h2M4.4 4.4l1.4 1.4M14.2 14.2l1.4 1.4M15.6 4.4l-1.4 1.4M5.8 14.2l-1.4 1.4"/></svg>
            <span class="theme-toggle__label">Tmavý režim</span>
          </button>
          <button class="lang-switch" type="button" aria-label="Přepnout jazyk">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M1.5 8h13M8 1.5c1.8 1.8 2.7 4 2.7 6.5S9.8 12.7 8 14.5C6.2 12.7 5.3 10.5 5.3 8S6.2 3.3 8 1.5Z"/></svg>
            <span>CS</span>
          </button>
        </div>
        <a href="#kontakt" class="btn btn--primary btn--block nav__cta">Domluvit schůzku</a>
      </div>
    </nav>

    <div class="site-header__actions">
      <button class="icon-btn theme-toggle" type="button" aria-label="Přepnout tmavý režim" aria-pressed="false">
        <svg class="theme-toggle__moon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 11.5A7.5 7.5 0 0 1 8.5 3a7.5 7.5 0 1 0 8.5 8.5Z"/></svg>
        <svg class="theme-toggle__sun" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden><circle cx="10" cy="10" r="3.6"/><path d="M10 1.5v2M10 16.5v2M2.5 10h2M15.5 10h2M4.4 4.4l1.4 1.4M14.2 14.2l1.4 1.4M15.6 4.4l-1.4 1.4M5.8 14.2l-1.4 1.4"/></svg>
      </button>
      <button class="lang-switch" type="button" aria-label="Přepnout jazyk">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true"><circle cx="8" cy="8" r="6.5"/><path d="M1.5 8h13M8 1.5c1.8 1.8 2.7 4 2.7 6.5S9.8 12.7 8 14.5C6.2 12.7 5.3 10.5 5.3 8S6.2 3.3 8 1.5Z"/></svg>
        <span>CS</span>
      </button>
      <a href="#kontakt" class="btn btn--primary btn--sm">Domluvit schůzku</a>
      <button class="nav-toggle" type="button" aria-label="Otevřít menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
